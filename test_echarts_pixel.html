<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
<div id="main" style="width: 600px;height:400px;"></div>
<script>
  var myChart = echarts.init(document.getElementById('main'));
  myChart.setOption({
      xAxis: { type: 'value', min: 0, max: 1 },
      yAxis: { type: 'value', min: 0, max: 100, inverse: true },
      series: [{ type: 'line', data: [[0.5, 50]] }]
  });
  console.log("Pixel:", myChart.convertToPixel({yAxisIndex: 0}, [0, 50]));
  console.log("Pixel with X and Y:", myChart.convertToPixel({xAxisIndex: 0, yAxisIndex: 0}, [0.5, 50]));
</script>
